<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NBS - Summative</title>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

  <style>
    html {
      height: 100%;
    }

    body {
      margin: 0;
      padding: 0;
      background-color: #030712;
      color: #f3f4f6;
      font-family: "Plus Jakarta Sans", sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      user-select: none;
      overflow: hidden;
    }

    #canvas-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -10;
    }

    .ambient-glow {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at center, rgba(0, 242, 254, 0.08), transparent 70%);
      pointer-events: none;
      z-index: -10;
    }

    .spacer {
      height: 5rem;
    }

    main {
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 0 1rem;
      z-index: 10;
      pointer-events: none;
    }

    .hero-container {
      pointer-events: auto;
      max-width: 36rem;
    }

    .hero-container > * + * {
      margin-top: 1.5rem;
    }

    h1 {
      font-size: 3.75rem;
      font-weight: 800;
      letter-spacing: -0.05em;
      color: #ffffff;
      margin: 0;
      line-height: 1;
    }

    @media (min-width: 768px) {
      h1 {
        font-size: 6rem;
      }
    }

    p {
      color: #9ca3af;
      font-size: 0.875rem;
      max-width: 24rem;
      margin: 0 auto;
      font-weight: 300;
      line-height: 1.625;
    }

    .btn-container {
      padding-top: 1rem;
    }

    .btn-wave {
      padding: 0.875rem 2rem;
      border-radius: 0.75rem;
      background-color: #ffffff;
      color: #030712;
      font-weight: 700;
      letter-spacing: 0.025em;
      border: none;
      cursor: pointer;
      box-shadow: 0 10px 15px -3px rgba(255, 255, 255, 0.1), 0 4px 6px -4px rgba(255, 255, 255, 0.1);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .btn-wave:hover {
      background-color: #00f2fe;
      transform: scale(1.05);
    }

    .btn-wave:active {
      transform: scale(0.95);
    }

    footer {
      width: 100%;
      padding: 1.5rem 0;
      text-align: center;
      font-size: 0.75rem;
      color: #4b5563;
      font-family: "Space Grotesk", monospace;
      z-index: 10;
      box-sizing: border-box;
    }
  </style>
</head>
<body class="antialiased">

  <div id="canvas-container"></div>

  <div class="ambient-glow"></div>

  <div class="spacer"></div>

  <main>
    <div class="hero-container">

      <h1>NBS</h1>

      <p>
        By Neehal, Brandon, and Sofia
      </p>

      <div class="btn-container">
        <button onclick="triggerRipple();window.location.href='one.html'" class="btn-wave" >
          Start Podcast Experience
        </button>
      </div>

    </div>
  </main>


  <script>
    const world = {
      plane: {
        width: 400,
        height: 400,
        widthSegments: 55,
        heightSegments: 55
      },
      wave: {
        speed: 0.012,
        intensity: 1.5
      }
    };

    const themes = [
      {
        base: { r: 0.05, g: 0.08, b: 0.22 },
        hover: { r: 0.0, g: 0.95, b: 1.0 }
      },
      {
        base: { r: 0.22, g: 0.05, b: 0.12 },
        hover: { r: 1.0, g: 0.5, b: 0.1 }
      },
      {
        base: { r: 0.02, g: 0.12, b: 0.05 },
        hover: { r: 0.0, g: 1.0, b: 0.4 }
      }
    ];

    let currentThemeIndex = 0;
    let activeTheme = themes[currentThemeIndex];

    let scene, camera, renderer, mesh, light;
    const raycaster = new THREE.Raycaster();
    const mouse = { x: 0, y: 0 };
    let frame = 0;

    function init() {
      const container = document.getElementById('canvas-container');
      
      scene = new THREE.Scene();

      camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.z = 50;

      renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      container.appendChild(renderer.domElement);

      generatePlane();

      light = new THREE.DirectionalLight(0xffffff, 1.2);
      light.position.set(0, 0, 1);
      scene.add(light);

      const backlight = new THREE.DirectionalLight(0xffffff, 0.3);
      backlight.position.set(0, 0, -1);
      scene.add(backlight);

      window.addEventListener('resize', onWindowResize);
      window.addEventListener('mousemove', onMouseMove);
      window.addEventListener('touchmove', onTouchMove, { passive: false });
      window.addEventListener('touchstart', onTouchMove, { passive: false });

      animate();
    }

    function generatePlane() {
      if (mesh) {
        scene.remove(mesh);
        mesh.geometry.dispose();
        mesh.material.dispose();
      }

      const geometry = new THREE.PlaneGeometry(
        world.plane.width,
        world.plane.height,
        world.plane.widthSegments,
        world.plane.heightSegments
      );

      const { array } = geometry.attributes.position;
      const randomValues = [];

      for (let i = 0; i < array.length; i++) {
        if (i % 3 === 2) {
          const x = array[i - 2];
          const y = array[i - 1];
          array[i] = (Math.random() - 0.5) * 3 + Math.sin(x * 0.05) * 4;
        }
        randomValues.push((Math.random() - 0.5) * world.wave.intensity);
      }

      geometry.attributes.position.randomValues = randomValues;
      geometry.attributes.position.originalPosition = array.slice();

      const colors = [];
      for (let i = 0; i < geometry.attributes.position.count; i++) {
        colors.push(activeTheme.base.r, activeTheme.base.g, activeTheme.base.b);
      }

      geometry.setAttribute('color', new THREE.BufferAttribute(new Float32Array(colors), 3));

      const material = new THREE.MeshPhongMaterial({
        side: THREE.DoubleSide,
        flatShading: true,
        vertexColors: true,
        shininess: 30
      });

      mesh = new THREE.Mesh(geometry, material);
      scene.add(mesh);
    }

    function animate() {
      requestAnimationFrame(animate);
      frame += world.wave.speed;

      if (mesh) {
        const { array, originalPosition, randomValues } = mesh.geometry.attributes.position;

        for (let i = 0; i < array.length; i += 3) {
          array[i] = originalPosition[i] + Math.cos(frame + randomValues[i]) * 0.05;
          array[i + 1] = originalPosition[i + 1] + Math.sin(frame + randomValues[i + 1]) * 0.05;
          array[i + 2] = originalPosition[i + 2] + Math.sin(frame + randomValues[i]) * 0.5;
        }

        mesh.geometry.attributes.position.needsUpdate = true;
        raycastIntersects();
      }

      if (camera) {
        camera.position.x += (mouse.x * 6 - camera.position.x) * 0.05;
        camera.position.y += (-mouse.y * 6 - camera.position.y) * 0.05;
        camera.lookAt(0, 0, 0);
      }

      renderer.render(scene, camera);
    }

    function raycastIntersects() {
      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObject(mesh);

      if (intersects.length > 0) {
        const { face } = intersects[0];
        const colorAttr = intersects[0].object.geometry.attributes.color;

        const base = activeTheme.base;
        const hover = activeTheme.hover;

        const initialColor = { r: hover.r, g: hover.g, b: hover.b };

        gsap.to(initialColor, {
          r: base.r,
          g: base.g,
          b: base.b,
          duration: 1.2,
          ease: "power2.out",
          onUpdate: () => {
            colorAttr.setX(face.a, initialColor.r);
            colorAttr.setY(face.a, initialColor.g);
            colorAttr.setZ(face.a, initialColor.b);

            colorAttr.setX(face.b, initialColor.r);
            colorAttr.setY(face.b, initialColor.g);
            colorAttr.setZ(face.b, initialColor.b);

            colorAttr.setX(face.c, initialColor.r);
            colorAttr.setY(face.c, initialColor.g);
            colorAttr.setZ(face.c, initialColor.b);

            colorAttr.needsUpdate = true;
          }
        });
      }
    }

    function onMouseMove(event) {
      mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
    }

    function onTouchMove(event) {
      if (event.touches.length > 0) {
        mouse.x = (event.touches[0].clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(event.touches[0].clientY / window.innerHeight) * 2 + 1;
      }
    }

    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function triggerRipple() {
      const colorAttr = mesh.geometry.attributes.color;
      const count = colorAttr.count;

      const rippleColor = { r: activeTheme.hover.r, g: activeTheme.hover.g, b: activeTheme.hover.b };
      
      gsap.to(rippleColor, {
        r: activeTheme.base.r,
        g: activeTheme.base.g,
        b: activeTheme.base.b,
        duration: 1.8,
        ease: "power2.out",
        onUpdate: () => {
          for (let i = 0; i < count; i++) {
            colorAttr.setX(i, rippleColor.r);
            colorAttr.setY(i, rippleColor.g);
            colorAttr.setZ(i, rippleColor.b);
          }
          colorAttr.needsUpdate = true;
        }
      });
    }

    window.onload = init;
  </script>
</body>
</html>
